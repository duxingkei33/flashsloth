<style>
/* ═══ 账号管理页核心样式 ═══ */

/* 账号卡片（增强版） */

.status-badge.cached { background:#d1ecf1;color:#0c5460; }

/* 操作按钮组 */

/* 视图切换 */

.empty-state-enhanced .step-card .step-label { font-size:13px;color:#555;line-height:1.4; }
.empty-state-enhanced .step-card:hover { border-color:#4361ee; }

/* 紧凑视图（列表模式） */
.compact-view .acct-card { padding:8px 12px;border-radius:6px;margin-bottom:4px;gap:8px; }
.compact-view .acct-card .plat-icon { width:24px;height:24px;font-size:13px; }

.compact-view .acct-info .detail-row { font-size:11px; }
.compact-view .acct-actions .btn { font-size:10px;padding:2px 6px; }

/* 平台卡片分类 */
.plat-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px; }
.plat-header h2 { margin:0;font-size:16px;display:flex;align-items:center;gap:8px; }
.plat-header .plat-count { font-size:12px;color:#999;font-weight:normal; }

/* 手机响应式 */
@media (max-width: 768px) {

    .filter-bar select { width:100%; }
