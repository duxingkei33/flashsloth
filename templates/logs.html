{% extends "base.html" %}
{% block title %}日志管理{% endblock %}
{% block content %}
<style>
.log-table { width:100%; border-collapse:collapse; font-size:13px; }
.log-table th { background:#f5f5f5; padding:8px 6px; text-align:left; border-bottom:2px solid #dee2e6; white-space:nowrap; }
.log-table td { padding:6px; border-bottom:1px solid #eee; vertical-align:top; }
.log-table tr:hover { background:#f8f9fa; }
.badge-success { background:#d4edda; color:#155724; padding:2px 8px; border-radius:10px; font-size:11px; }
.badge-danger  { background:#f8d7da; color:#721c24; padding:2px 8px; border-radius:10px; font-size:11px; }
.badge-info    { background:#d1ecf1; color:#0c5460; padding:2px 8px; border-radius:10px; font-size:11px; }
.badge-warning { background:#fff3cd; color:#856404; padding:2px 8px; border-radius:10px; font-size:11px; }
.pagination { display:flex; gap:4px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
.pagination a { padding:4px 12px; border:1px solid #dee2e6; border-radius:4px; text-decoration:none; color:#007bff; }
.pagination a.active { background:#007bff; color:white; border-color:#007bff; }
.pagination a:hover { background:#e9ecef; }
.pagination .page-info { padding:4px 12px; color:#666; font-size:13px; }
.tab-bar { display:flex; gap:0; border-bottom:2px solid #dee2e6; margin-bottom:16px; }
.tab-btn { padding:10px 20px; border:none; background:transparent; cursor:pointer; font-size:14px; color:#666; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; }
.tab-btn:hover { color:#333; background:#f8f9fa; }
.tab-btn.active { color:#4361ee; border-bottom-color:#4361ee; font-weight:600; }
.tab-btn .tab-count { display:inline-block; margin-left:4px; padding:0 6px; border-radius:8px; font-size:11px; line-height:18px; font-weight:600; }
.tab-content { display:none; }
.tab-content.active { display:block; }
.log-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.log-header h3 { margin:0; font-size:15px; color:#1a1a2e; }
.log-header .actions { display:flex; gap:8px; }
.empty-state { text-align:center; padding:60px 20px; color:#999; font-size:14px; }
.empty-state .icon { font-size:48px; margin-bottom:12px; }
.cell-truncate { max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cell-truncate-wide { max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
@media (max-width: 768px) {
  .tab-btn { padding:8px 12px; font-size:12px; }
  .cell-truncate { max-width:100px; }
  .cell-truncate-wide { max-width:160px; }
  .log-header { flex-direction: column; align-items: flex-start !important; gap: 8px; }
  .log-header .actions { width: 100%; }
  .log-header .btn { flex: 1 1 auto; text-align: center; min-height: 40px; }
  .tab-bar { overflow-x: auto; white-space: nowrap; }
  .log-table { font-size: 12px; display: block; overflow-x: auto; }
  .log-table th, .log-table td { white-space: nowrap; padding: 4px 3px; }
  .pagination a { padding: 6px 10px; font-size: 12px; min-width: 36px; text-align: center; }
}
@media (max-width: 480px) {
  .log-table { font-size: 11px; }
  .log-table th, .log-table td { padding: 3px 2px; }
  .tab-btn { padding: 6px 10px; font-size: 11px; }
  .log-header h3 { font-size: 14px; }
  .log-header .btn { min-height: 44px; font-size: 12px; }
  .pagination a { padding: 8px 12px; font-size: 14px; min-width: 44px; }
  .empty-state { padding: 30px 12px; }
  .empty-state .icon { font-size: 36px; }
  .cell-truncate { max-width: 80px; }
  .cell-truncate-wide { max-width: 120px; }
}
</style>

<h2 style="margin:0 0 4px;">📋 日志管理</h2>
<p style="color:#888;font-size:13px;margin:0 0 16px;">统一管理所有系统操作日志</p>

<!-- Tab 导航 -->
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-tab="publish_log" onclick="switchTab('publish_log')">
    📤 发布日志 <span class="tab-count" id="count-publish" style="background:#d4edda;color:#155724;">0</span>
  </button>
  <button class="tab-btn" data-tab="signin_log" onclick="switchTab('signin_log')">
    ✅ 签到日志 <span class="tab-count" id="count-signin" style="background:#d1ecf1;color:#0c5460;">0</span>
  </button>
  <button class="tab-btn" data-tab="ai_call_log" onclick="switchTab('ai_call_log')">
    🤖 AI调用日志 <span class="tab-count" id="count-ai" style="background:#e8daef;color:#6c3483;">0</span>
  </button>
  <button class="tab-btn" data-tab="deploy_log" onclick="switchTab('deploy_log')">
    🚀 部署日志 <span class="tab-count" id="count-deploy" style="background:#fdebd0;color:#935e38;">0</span>
  </button>
</div>

<!-- ═══ 发布日志 ═══ -->
<div class="tab-content active" id="tab-publish_log">
  <div class="log-header">
    <h3>📤 发布日志</h3>
    <div class="actions">
      <button class="btn btn-sm btn-primary" onclick="switchTab('publish_log')">🔄 刷新</button>
      <button class="btn btn-sm btn-danger" onclick="clearLogs('publish')">🗑️ 清空全部</button>
    </div>
  </div>
  <div style="overflow-x:auto;">
    <table class="log-table">
      <thead>
        <tr>
          <th>平台</th>
          <th>账号</th>
          <th>状态</th>
          <th>URL</th>
          <th>错误信息</th>
          <th>时间</th>
          <th style="width:60px;">操作</th>
        </tr>
      </thead>
      <tbody id="body-publish_log">
        <tr><td colspan="7" style="text-align:center;padding:40px;color:#999;">加载中...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="pagination" id="page-publish_log"></div>
</div>

<!-- ═══ 签到日志 ═══ -->
<div class="tab-content" id="tab-signin_log">
  <div class="log-header">
    <h3>✅ 签到日志</h3>
    <div class="actions">
      <button class="btn btn-sm btn-primary" onclick="switchTab('signin_log')">🔄 刷新</button>
      <button class="btn btn-sm btn-danger" onclick="clearLogs('signin')">🗑️ 清空全部</button>
    </div>
  </div>
  <div style="overflow-x:auto;">
    <table class="log-table">
      <thead>
        <tr>
          <th>平台</th>
          <th>账号</th>
          <th>状态</th>
          <th>已签到</th>
          <th>消息</th>
          <th>时间</th>
          <th style="width:60px;">操作</th>
        </tr>
      </thead>
      <tbody id="body-signin_log">
        <tr><td colspan="7" style="text-align:center;padding:40px;color:#999;">加载中...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="pagination" id="page-signin_log"></div>
</div>

<!-- ═══ AI调用日志 ═══ -->
<div class="tab-content" id="tab-ai_call_log">
  <div class="log-header">
    <h3>🤖 AI调用日志</h3>
    <div class="actions">
      <button class="btn btn-sm btn-primary" onclick="switchTab('ai_call_log')">🔄 刷新</button>
      <button class="btn btn-sm btn-danger" onclick="clearLogs('ai')">🗑️ 清空全部</button>
    </div>
  </div>
  <div style="overflow-x:auto;">
    <table class="log-table">
      <thead>
        <tr>
          <th>能力类型</th>
          <th>提供商</th>
          <th>模型</th>
          <th>Token数</th>
          <th>花费</th>
          <th>状态</th>
          <th>摘要</th>
          <th>时间</th>
          <th style="width:60px;">操作</th>
        </tr>
      </thead>
      <tbody id="body-ai_call_log">
        <tr><td colspan="9" style="text-align:center;padding:40px;color:#999;">加载中...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="pagination" id="page-ai_call_log"></div>
</div>

<!-- ═══ 部署日志 ═══ -->
<div class="tab-content" id="tab-deploy_log">
  <div class="log-header">
    <h3>🚀 部署日志</h3>
    <div class="actions">
      <button class="btn btn-sm btn-primary" onclick="switchTab('deploy_log')">🔄 刷新</button>
      <button class="btn btn-sm btn-danger" onclick="clearLogs('deploy')">🗑️ 清空全部</button>
    </div>
  </div>
  <div style="overflow-x:auto;">
    <table class="log-table">
      <thead>
        <tr>
          <th>部署器名称</th>
          <th>状态</th>
          <th>URL</th>
          <th>错误信息</th>
          <th>时间</th>
          <th style="width:60px;">操作</th>
        </tr>
      </thead>
      <tbody id="body-deploy_log">
        <tr><td colspan="6" style="text-align:center;padding:40px;color:#999;">加载中...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="pagination" id="page-deploy_log"></div>
</div>

<script>
// ═══ 配置 ═══
const TAB_CONFIG = {
  publish_log: { api: 'publish', title: '发布日志', emptyIcon: '📤', emptyText: '暂无发布日志' },
  signin_log:  { api: 'signin',  title: '签到日志', emptyIcon: '✅', emptyText: '暂无签到日志' },
  ai_call_log: { api: 'ai',      title: 'AI调用日志', emptyIcon: '🤖', emptyText: '暂无AI调用日志' },
  deploy_log:  { api: 'deploy',  title: '部署日志', emptyIcon: '🚀', emptyText: '暂无部署日志' },
};

// 每个Tab的分页状态
const pageState = {};
for (const tab in TAB_CONFIG) {
  pageState[tab] = { page: 1, totalPages: 1, total: 0 };
}

// ═══ Tab切换 ═══
function switchTab(tab) {
  // 隐藏所有tab内容
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  // 显示选中tab
  const content = document.getElementById('tab-' + tab);
  if (content) content.classList.add('active');
  const btn = document.querySelector('.tab-btn[data-tab="' + tab + '"]');
  if (btn) btn.classList.add('active');
  // 加载数据
  loadLogs(tab);
}

// ═══ 加载日志数据 ═══
function loadLogs(tab, page) {
  const cfg = TAB_CONFIG[tab];
  if (!cfg) return;
  const state = pageState[tab];
  if (page) state.page = page;

  const url = '/api/logs/' + cfg.api + '?page=' + state.page + '&per_page=50';

  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (!data.success) {
        showEmpty(tab, '加载失败');
        return;
      }
      const logs = data.logs || [];
      state.total = data.total || 0;
      state.totalPages = Math.ceil(state.total / (data.per_page || 50)) || 1;

      const tbody = document.getElementById('body-' + tab);
      if (logs.length === 0) {
        showEmpty(tab, cfg.emptyText);
        renderPagination(tab);
        return;
      }

      tbody.innerHTML = logs.map(log => renderRow(tab, log)).join('');
      renderPagination(tab);
    })
    .catch(() => {
      showEmpty(tab, '⚠️ 加载失败，请检查网络连接');
    });
}

// ═══ 渲染行 ═══
function renderRow(tab, log) {
  const created = (log.created_at || '').slice(0, 19).replace('T', ' ');
  const delBtn = '<button class="btn btn-sm btn-danger" onclick="deleteLog(\'' + tab + '\',' + log.id + ')" style="padding:2px 8px;font-size:11px;">🗑 删除</button>';

  switch (tab) {
    case 'publish_log': {
      const statusHtml = log.success
        ? '<span class="badge-success">✅ 成功</span>'
        : '<span class="badge-danger">❌ 失败</span>';
      const urlHtml = log.url
        ? '<a href="' + log.url + '" target="_blank" style="color:#007bff;font-size:12px;" title="' + log.url.replace(/"/g,'&quot;') + '">🔗 链接</a>'
        : '<span style="color:#999;">-</span>';
      return '<tr>' +
        '<td style="white-space:nowrap;">' + esc(log.platform || '-') + '</td>' +
        '<td style="white-space:nowrap;">' + esc(log.account || '-') + '</td>' +
        '<td>' + statusHtml + '</td>' +
        '<td>' + urlHtml + '</td>' +
        '<td class="cell-truncate" title="' + esc(log.error || '') + '" style="color:' + (log.error ? '#dc3545' : '#999') + ';font-size:12px;">' + (log.error ? esc(log.error).slice(0, 80) : '-') + '</td>' +
        '<td style="font-size:11px;color:#888;white-space:nowrap;">' + created + '</td>' +
        '<td>' + delBtn + '</td>' +
        '</tr>';
    }

    case 'signin_log': {
      const statusHtml = log.success
        ? '<span class="badge-success">✅ 成功</span>'
        : '<span class="badge-danger">❌ 失败</span>';
      const signedHtml = log.signed
        ? '<span class="badge-info">已签到</span>'
        : '<span class="badge-warning">未签到</span>';
      return '<tr>' +
        '<td style="white-space:nowrap;">' + esc(log.platform || '-') + '</td>' +
        '<td style="white-space:nowrap;">' + esc(log.account || '-') + '</td>' +
        '<td>' + statusHtml + '</td>' +
        '<td>' + signedHtml + '</td>' +
        '<td class="cell-truncate-wide" title="' + esc(log.message || '') + '" style="font-size:12px;">' + esc(log.message || '-') + '</td>' +
        '<td style="font-size:11px;color:#888;white-space:nowrap;">' + created + '</td>' +
        '<td>' + delBtn + '</td>' +
        '</tr>';
    }

    case 'ai_call_log': {
      const statusHtml = log.success
        ? '<span class="badge-success">✅ 成功</span>'
        : '<span class="badge-danger">❌ 失败</span>';
      return '<tr>' +
        '<td><code style="font-size:11px;">' + esc(log.capability || '-') + '</code></td>' +
        '<td style="font-size:12px;">' + esc(log.provider || '-') + '</td>' +
        '<td style="font-size:12px;">' + esc(log.model || '-') + '</td>' +
        '<td style="font-size:12px;">' + (log.prompt_tokens || 0) + '→' + (log.response_tokens || 0) + '</td>' +
        '<td style="font-size:12px;">' + (log.cost ? '¥' + log.cost.toFixed(4) : '-') + '</td>' +
        '<td>' + statusHtml + '</td>' +
        '<td class="cell-truncate-wide" title="' + esc((log.response_summary||'').replace(/"/g,'&quot;')) + '" style="font-size:12px;">' + esc((log.response_summary||'-').slice(0, 80)) + '</td>' +
        '<td style="font-size:11px;color:#888;white-space:nowrap;">' + created + '</td>' +
        '<td>' + delBtn + '</td>' +
        '</tr>';
    }

    case 'deploy_log': {
      const statusHtml = log.success
        ? '<span class="badge-success">✅ 成功</span>'
        : '<span class="badge-danger">❌ 失败</span>';
      const urlHtml = log.url
        ? '<a href="' + log.url + '" target="_blank" style="color:#007bff;font-size:12px;" title="' + log.url.replace(/"/g,'&quot;') + '">🔗 链接</a>'
        : '<span style="color:#999;">-</span>';
      return '<tr>' +
        '<td style="white-space:nowrap;">' + esc(log.deployer_name || log.name || '-') + '</td>' +
        '<td>' + statusHtml + '</td>' +
        '<td>' + urlHtml + '</td>' +
        '<td class="cell-truncate" title="' + esc(log.error || '') + '" style="color:' + (log.error ? '#dc3545' : '#999') + ';font-size:12px;">' + (log.error ? esc(log.error).slice(0, 80) : '-') + '</td>' +
        '<td style="font-size:11px;color:#888;white-space:nowrap;">' + created + '</td>' +
        '<td>' + delBtn + '</td>' +
        '</tr>';
    }

    default:
      return '';
  }
}

// ═══ 空状态 ═══
function showEmpty(tab, text) {
  const tbody = document.getElementById('body-' + tab);
  const cfg = TAB_CONFIG[tab];
  const icon = cfg ? cfg.emptyIcon : '📋';
  const colspan = tab === 'ai_call_log' ? 9 : (tab === 'deploy_log' ? 6 : 7);
  tbody.innerHTML = '<tr><td colspan="' + colspan + '" class="empty-state">' +
    '<div class="icon">' + icon + '</div>' + esc(text) + '</td></tr>';
}

// ═══ 分页 ═══
function renderPagination(tab) {
  const container = document.getElementById('page-' + tab);
  const state = pageState[tab];
  if (state.totalPages <= 1) {
    container.innerHTML = state.total > 0
      ? '<span class="page-info">共 ' + state.total + ' 条记录</span>'
      : '';
    return;
  }
  let html = '<span class="page-info">共 ' + state.total + ' 条 / 第 ' + state.page + '/' + state.totalPages + ' 页</span>';
  for (let i = 1; i <= state.totalPages; i++) {
    html += '<a href="#" class="' + (i === state.page ? 'active' : '') + '" onclick="loadLogs(\'' + tab + '\',' + i + ');return false;">' + i + '</a>';
  }
  container.innerHTML = html;
}

// ═══ 单条删除 ═══
function deleteLog(tab, id) {
  if (!confirm('确定删除该条日志？')) return;
  const cfg = TAB_CONFIG[tab];
  fetch('/api/logs/' + cfg.api + '/' + id, { method: 'DELETE' })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        loadLogs(tab);
        loadStats();
      } else {
        alert('删除失败：' + (data.error || '未知错误'));
      }
    })
    .catch(() => alert('删除请求失败'));
}

// ═══ 一键清空 ═══
function clearLogs(apiType) {
  const labelMap = { publish: '发布日志', signin: '签到日志', ai: 'AI调用日志', deploy: '部署日志' };
  if (!confirm('确定清空所有 ' + (labelMap[apiType] || '') + ' ？此操作不可恢复！')) return;
  fetch('/api/logs/' + apiType + '/clear', { method: 'POST' })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        // 找到对应的tab并刷新
        for (const tab in TAB_CONFIG) {
          if (TAB_CONFIG[tab].api === apiType) {
            loadLogs(tab);
            break;
          }
        }
        loadStats();
      } else {
        alert('清空失败：' + (data.error || '未知错误'));
      }
    })
    .catch(() => alert('清空请求失败'));
}

// ═══ 加载统计 ═══
function loadStats() {
  fetch('/api/logs/stats')
    .then(r => r.json())
    .then(data => {
      if (!data.success) return;
      const stats = data.stats || {};
      const countEl = document.getElementById('count-publish');
      if (countEl) countEl.textContent = stats.publish_log || 0;
      const countSe = document.getElementById('count-signin');
      if (countSe) countSe.textContent = stats.signin_log || 0;
      const countAi = document.getElementById('count-ai');
      if (countAi) countAi.textContent = stats.ai_call_log || 0;
      const countDep = document.getElementById('count-deploy');
      if (countDep) countDep.textContent = stats.deploy_log || 0;
    })
    .catch(function() {});
}

// ═══ 工具：HTML转义 ═══
function esc(str) {
  if (str === null || str === undefined) return '-';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ═══ 初始化 ═══
loadStats();
loadLogs('publish_log');
</script>
{% endblock %}
