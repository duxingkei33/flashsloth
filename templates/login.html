{% extends "base.html" %}
{% block title %}FlashSloth 登录{% endblock %}
{% block content %}
<div class="auth-form">
    <div class="card">
        <h1>🦥 FlashSloth <span style="color:#666;font-weight:400;font-size:.6em;display:block;">树懒的速度，闪电的发布</span></h1>
        <form method="post">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">登录</button>
        </form>
        <div class="links">
            <a href="/register">注册账号</a>
        </div>
    </div>
</div>
{% endblock %}
