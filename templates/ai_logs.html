{% extends "base.html" %}
{% block title %}AI 调用日志{% endblock %}
{% block content %}
<style>
.log-table { width:100%; border-collapse:collapse; font-size:13px; }
.log-table th { background:#f5f5f5; padding:8px 6px; text-align:left; border-bottom:2px solid #dee2e6; white-space:nowrap; }
.log-table td { padding:6px; border-bottom:1px solid #eee; vertical-align:top; }
.log-table tr:hover { background:#f8f9fa; }
.badge-success { background:#d4edda; color:#155724; padding:2px 8px; border-radius:10px; font-size:11px; }
.badge-danger  { background:#f8d7da; color:#721c24; padding:2px 8px; border-radius:10px; font-size:11px; }
.summary-cell { max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.preview-cell { max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#888; font-size:12px; }
.filter-bar { display:flex; gap:12px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
.pagination { display:flex; gap:4px; justify-content:center; margin-top:12px; }
.pagination a { padding:4px 12px; border:1px solid #dee2e6; border-radius:4px; text-decoration:none; color:#007bff; }
.pagination a.active { background:#007bff; color:white; border-color:#007bff; }
.pagination a:hover { background:#e9ecef; }
</style>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <h2 style="margin:0;">🤖 AI 调用日志</h2>
    <div>
        <button class="btn btn-sm btn-danger" onclick="clearLogs()" style="margin-right:8px;">🗑️ 清空日志</button>
        <button class="btn btn-sm btn-primary" onclick="refreshLogs()">🔄 刷新</button>
    </div>
</div>

<div class="card">
    <div class="filter-bar">
        <label style="font-weight:bold;">能力:</label>
        <select id="filterCapability" onchange="refreshLogs()">
            <option value="">全部</option>
            <option value="writing">写作</option>
            <option value="translate">翻译</option>
            <option value="image_gen">画图</option>
            <option value="audio_gen">配音</option>
            <option value="video_gen">视频</option>
        </select>
        <label style="font-weight:bold;">状态:</label>
        <select id="filterSuccess" onchange="refreshLogs()">
            <option value="">全部</option>
            <option value="1">✅ 成功</option>
            <option value="0">❌ 失败</option>
        </select>
        <span id="totalInfo" style="color:#888;font-size:13px;"></span>
    </div>

    <div style="overflow-x:auto;">
        <table class="log-table">
            <thead>
                <tr>
                    <th>时间</th>
                    <th>能力</th>
                    <th>Provider</th>
                    <th>模型</th>
                    <th>结果</th>
                    <th>Token</th>
                    <th>费用</th>
                    <th>Prompt预览</th>
                    <th>响应摘要</th>
                    <th>错误</th>
                </tr>
            </thead>
            <tbody id="logBody">
                <tr><td colspan="10" style="text-align:center;padding:40px;color:#999;">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>
</div>

<script>
let currentPage = 1;
let totalPages = 1;

function refreshLogs(page) {
    if (page) currentPage = page;
    const cap = document.getElementById('filterCapability').value;
    const suc = document.getElementById('filterSuccess').value;
    let url = `/api/ai/logs?page=${currentPage}&per_page=50`;
    if (cap) url += `&capability=${cap}`;
    if (suc) url += `&success=${suc}`;

    fetch(url)
        .then(r => r.json())
        .then(data => {
            if (!data.success) return;
            const tbody = document.getElementById('logBody');
            const total = data.total;
            totalPages = Math.ceil(total / data.per_page) || 1;
            document.getElementById('totalInfo').textContent = `共 ${total} 条记录`;

            if (total === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:#999;">暂无 AI 调用记录</td></tr>';
                renderPagination();
                return;
            }

            tbody.innerHTML = data.logs.map(log => {
                const successBadge = log.success
                    ? '<span class="badge-success">✅ 成功</span>'
                    : '<span class="badge-danger">❌ 失败</span>';
                return `<tr>
                    <td style="font-size:11px;color:#888;white-space:nowrap;">${(log.created_at||'').slice(0,16)}</td>
                    <td><code>${log.capability||'-'}</code></td>
                    <td>${log.provider||'-'}</td>
                    <td style="font-size:12px;">${log.model||'-'}</td>
                    <td>${successBadge}</td>
                    <td style="font-size:12px;">${log.prompt_tokens||0}→${log.response_tokens||0}</td>
                    <td style="font-size:12px;">${log.cost ? '¥'+log.cost.toFixed(4) : '-'}</td>
                    <td class="preview-cell" title="${(log.prompt_preview||'').replace(/"/g,'&quot;')}">${(log.prompt_preview||'-').slice(0,60)}</td>
                    <td class="summary-cell" title="${(log.response_summary||'').replace(/"/g,'&quot;')}">${(log.response_summary||'-').slice(0,80)}</td>
                    <td style="color:${log.error?'#dc3545':'#999'};font-size:12px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${(log.error||'').replace(/"/g,'&quot;')}">${log.error||'-'}</td>
                </tr>`;
            }).join('');
            renderPagination();
        })
        .catch(() => {
            document.getElementById('logBody').innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:#dc3545;">加载失败</td></tr>';
        });
}

function renderPagination() {
    const container = document.getElementById('pagination');
    if (totalPages <= 1) { container.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= totalPages; i++) {
        html += `<a href="#" class="${i===currentPage?'active':''}" onclick="refreshLogs(${i});return false;">${i}</a>`;
    }
    container.innerHTML = html;
}

function clearLogs() {
    if (!confirm('确定清空所有 AI 调用日志？')) return;
    fetch('/api/ai/logs/clear', { method: 'POST' })
        .then(r => r.json())
        .then(d => { if(d.success) refreshLogs(1); });
}

refreshLogs();
</script>
{% endblock %}
