{% extends "base.html" %}
{% block title %}找回密码{% endblock %}
{% block content %}
<div class="auth-form">
    <div class="card">
        <h1>找回密码</h1>
        <form method="post">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>手机号</label>
                <input type="text" name="phone" placeholder="注册时绑定的手机号">
            </div>
            <div class="form-group">
                <label>短信验证码</label>
                <input type="text" name="sms_code" placeholder="输入收到的验证码">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" name="new_password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">重置密码</button>
        </form>
        <div class="links">
            <a href="/login">返回登录</a>
        </div>
    </div>
</div>
{% endblock %}
