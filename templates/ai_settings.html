{% extends "base.html" %}
{% block title %}AI 能力配置{% endblock %}
{% block content %}
<h1 style="margin-bottom:20px;">🤖 AI 能力配置</h1>
<p style="color:#666;margin-bottom:20px;">从数据库动态加载 — 先选择供应商 → 填别称 + API Key → 测试连接 → 自动保存</p>

<style>
.ai-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border:1px solid #e0e0e0; border-radius:8px; margin-bottom:6px; transition:background .15s; flex-wrap:wrap; }
.ai-row:hover { background:#f8f9fa; }
.ai-row.disabled { opacity:.55; background:#f5f5f5; }
.ai-icon { font-size:22px; flex-shrink:0; }
.ai-name { font-weight:600; flex-shrink:0; min-width:100px; font-size:14px; }
.ai-alias { color:#666; font-size:12px; flex-shrink:0; }
.ai-website-link { font-size:12px; color:#4361ee; text-decoration:none; flex-shrink:0; }
.ai-website-link:hover { text-decoration:underline; }
.ai-status-badge { flex-shrink:0; min-width:80px; text-align:center; font-size:12px; }
.ai-balance { flex-shrink:0; font-size:12px; color:#666; background:#f0f0f0; padding:2px 8px; border-radius:4px; }
.ai-tools { display:flex; gap:6px; flex-shrink:0; margin-left:auto; }
.ai-refresh-btn, .ai-toggle-btn, .ai-delete-btn { padding:3px 10px; border-radius:4px; border:1px solid #ddd; background:#fff; cursor:pointer; font-size:12px; }
.ai-refresh-btn:hover { background:#e8f4fd; }
.ai-toggle-btn.on { background:#d4edda; border-color:#22c55e; }
.ai-toggle-btn.off { background:#f8d7da; border-color:#dc3545; }
.ai-delete-btn:hover { background:#f8d7da; border-color:#dc3545; color:#dc3545; }
</style>

<!-- 顶部操作栏 -->
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
    <div style="display:flex;align-items:center;gap:8px;">
        <select id="providerSelector" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;min-width:220px;">
            <option value="">— 选择供应商添加 —</option>
        </select>
        <button onclick="onAddProvider()" class="btn btn-success">➕ 添加</button>
        <button onclick="showAddCustomProvider()" class="btn btn-sm btn-info">✏️ 自定义</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
        <button onclick="refreshAllBalances()" class="btn btn-sm btn-secondary">🔄 刷新余额</button>
        <span id="aiCount" style="font-size:13px;color:#666;"></span>
    </div>
</div>

<!-- 已配置的供应商列表（单列） -->
<div class="card" style="padding:16px;">
    <h2 style="margin-bottom:12px;font-size:15px;">🔌 已配置的 AI 供应商</h2>
    <div id="providerList">
        <p style="color:#999;padding:20px;text-align:center;">加载中...</p>
    </div>
</div>

<!-- 添加供应商弹窗 -->
<div id="addProviderModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;
     background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:28px;max-width:520px;width:92%;max-height:85vh;overflow-y:auto;">
        <h2 style="margin-bottom:16px;font-size:18px;">➕ <span id="addProvName"></span></h2>
        <div class="form-group">
            <label>别称 <span style="color:#999;font-size:12px;">（同一供应商可添加多个，必填）</span></label>
            <input id="addField_alias" style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;" placeholder="例如: 工作号、主力Key">
        </div>
        <div id="addProvFields"></div>
        <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;">
            <button onclick="testAndSaveProvider()" class="btn btn-primary">🔍 测试并保存</button>
            <button onclick="testOnlyProvider()" class="btn btn-info" id="testOnlyBtn">🔍 仅测试</button>
            <button onclick="closeAddModal()" class="btn" style="background:#eee;">取消</button>
        </div>
        <div id="addProvTestResult" style="margin-top:10px;padding:10px;border-radius:6px;display:none;"></div>
    </div>
</div>

<!-- 自定义供应商弹窗 -->
<div id="customProvModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;
     background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:12px;padding:28px;max-width:520px;width:92%;max-height:85vh;overflow-y:auto;">
        <h2 style="margin-bottom:16px;font-size:18px;">✏️ 自定义供应商</h2>
        <div class="form-group"><label>名称</label><input id="custName" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;"></div>
        <div class="form-group"><label>API Base URL</label><input id="custBase" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;" placeholder="https://api.example.com/v1"></div>
        <div class="form-group"><label>API 格式</label>
            <select id="custFormat" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;">
                <option value="openai">OpenAI 兼容</option>
                <option value="anthropic">Anthropic</option>
                <option value="gemini">Gemini</option>
            </select>
        </div>
        <div class="form-group"><label>模型（逗号分隔）</label><input id="custModels" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;" placeholder="gpt-4o, gpt-4o-mini"></div>
        <div style="display:flex;gap:8px;margin-top:16px;">
            <button onclick="saveCustomProvider()" class="btn btn-primary">💾 保存</button>
            <button onclick="closeCustomModal()" class="btn" style="background:#eee;">取消</button>
        </div>
    </div>
</div>

<script>
// ====== 页面加载 ======
let _currentProvider = null;

document.addEventListener('DOMContentLoaded', function() {
    loadRegistry();
    loadConfigured();
});

function loadRegistry() {
    fetch('/api/ai/providers/list')
    .then(r => r.json())
    .then(data => {
        renderProviderSelector(data);
    })
    .catch(() => {});
}

function loadConfigured() {
    fetch('/api/ai/providers/configured')
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            renderConfiguredList(data.providers || []);
            document.getElementById('aiCount').textContent = '已配置 ' + (data.providers || []).length + ' 个';
        }
    })
    .catch(() => {
        document.getElementById('providerList').innerHTML = '<p style="color:#999;padding:20px;text-align:center;">加载失败</p>';
    });
}

function renderProviderSelector(data) {
    const sel = document.getElementById('providerSelector');
    const providers = data.providers || [];
    const catMap = {};
    providers.forEach(p => {
        const cat = p.category || 'custom';
        if (!catMap[cat]) catMap[cat] = [];
        catMap[cat].push(p);
    });
    sel.innerHTML = '<option value="">— 选择供应商添加 —</option>';
    Object.entries(catMap).forEach(([cat, list]) => {
        const catInfo = (data.categories || {})[cat] || {name: cat, icon: '📦'};
        const group = document.createElement('optgroup');
        group.label = catInfo.icon + ' ' + (catInfo.name || cat);
        list.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.name;
            opt.textContent = p.icon + ' ' + p.display_name;
            opt.dataset.data = JSON.stringify(p);
            group.appendChild(opt);
        });
        sel.appendChild(group);
    });
}

function renderConfiguredList(providers) {
    const container = document.getElementById('providerList');
    if (!providers.length) {
        container.innerHTML = '<p style="color:#999;padding:20px;text-align:center;">暂无已配置的供应商，请从上方选择添加</p>';
        return;
    }

    // 按同类排序
    const catOrder = ['chat', 'image', 'audio', 'video', 'embedding', 'custom'];
    providers.sort((a, b) => {
        const ai = catOrder.indexOf(a.category || 'custom');
        const bi = catOrder.indexOf(b.category || 'custom');
        if (ai !== bi) return ai - bi;
        return (a.display_name || a.provider).localeCompare(b.display_name || b.provider);
    });

    let html = '';
    providers.forEach(p => {
        const enabled = p.enabled !== 0;
        const status = p.status || 'untested';
        const balance = p.balance || '';
        const website = p.website || '';
        const alias = p.alias || '';
        const models = (p.models_list || []).slice(0,3).join(', ') + ((p.models_list || []).length > 3 ? '...' : '');

        html += '<div class="ai-row ' + (enabled ? '' : 'disabled') + '" id="airow_' + p.id + '">' +
            '<span class="ai-icon">' + (p.icon || '🤖') + '</span>' +
            '<span class="ai-name">' + escapeHtml(p.display_name || p.provider) + '</span>' +
            (alias ? '<span class="ai-alias">(' + escapeHtml(alias) + ')</span>' : '') +
            (website ? '<a href="' + website + '" target="_blank" class="ai-website-link" title="' + website + '">🌐 官网</a>' : '') +
            '<span class="ai-status-badge">' +
                (status === 'connected'
                    ? '<span class="badge badge-success">✅ 已连接</span>'
                    : status === 'failed'
                    ? '<span class="badge badge-danger">❌ 断开</span>'
                    : '<span class="badge badge-warning">⏳ 未测</span>') +
            '</span>' +
            (balance ? '<span class="ai-balance" id="balance_' + p.id + '">💰 ' + escapeHtml(balance) + '</span>' : '') +
            (models ? '<span style="font-size:11px;color:#999;flex-shrink:0;">' + escapeHtml(models) + '</span>' : '') +
            '<span class="ai-tools">' +
                '<button class="ai-refresh-btn" onclick="refreshBalance(' + p.id + ')" title="刷新余额">🔄</button>' +
                '<button class="ai-toggle-btn ' + (enabled ? 'on' : 'off') + '" onclick="toggleProvider(' + p.id + ')" title="' + (enabled ? '已启用 - 点击禁用' : '已禁用 - 点击启用') + '">' +
                    (enabled ? '🟢 启用' : '🔴 禁用') +
                '</button>' +
                '<button class="ai-delete-btn" onclick="deleteProvider(' + p.id + ')" title="从数据库删除">🗑️ 删除</button>' +
            '</span>' +
        '</div>';
    });
    container.innerHTML = html;
}

// ====== 添加供应商 ======
function onAddProvider() {
    const sel = document.getElementById('providerSelector');
    const opt = sel.options[sel.selectedIndex];
    if (!opt.value) { alert('请先选择一个供应商'); return; }
    const p = JSON.parse(opt.dataset.data || '{}');
    showAddModal(p);
}

function showAddModal(p) {
    _currentProvider = p;
    document.getElementById('addProvName').textContent = (p.icon || '') + ' ' + (p.display_name || p.name);
    document.getElementById('addField_alias').value = '';

    let fields = p.config_fields || [];
    if (p.api_base && !fields.find(f => f.key === 'api_base')) {
        fields.push({key: 'api_base', label: 'API Base URL', type: 'text', required: false, placeholder: p.api_base});
    }
    let html = '';
    fields.forEach(f => {
        const t = f.type === 'password' ? 'password' : 'text';
        html += '<div class="form-group"><label>' + (f.label || f.key) + '</label>' +
            '<input type="' + t + '" id="addField_' + f.key + '" placeholder="' + (f.placeholder || '') + '"' +
            ' style="width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;"></div>';
    });
    document.getElementById('addProvFields').innerHTML = html;
    document.getElementById('addProvTestResult').style.display = 'none';
    document.getElementById('addProviderModal').style.display = 'flex';
}

function closeAddModal() {
    document.getElementById('addProviderModal').style.display = 'none';
}

function testOnlyProvider() {
    _testConnection(false);
}

function testAndSaveProvider() {
    _testConnection(true);
}

function _testConnection(saveOnSuccess) {
    const p = _currentProvider;
    if (!p) return;
    const alias = document.getElementById('addField_alias')?.value?.trim() || '';
    const apiKey = document.getElementById('addField_api_key')?.value || '';
    if (!apiKey) { alert('请先填写 API Key'); return; }
    const baseField = document.getElementById('addField_api_base');
    const apiBase = baseField?.value || '';
    const apiFormat = p.api_format || 'openai';

    const div = document.getElementById('addProvTestResult');
    div.style.display = 'block';
    div.style.background = '#fff3cd';
    div.style.color = '#856404';
    div.innerHTML = '⏳ 测试连接中（零 token 消耗）...';

    // Step 1: 测试连接
    fetch('/api/ai/providers/configured/test', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            provider: p.name,
            api_key: apiKey,
            api_base: apiBase,
            api_format: apiFormat,
        }),
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            div.style.background = '#d4edda';
            div.style.color = '#155724';
            div.innerHTML = '✅ ' + escapeHtml(data.message || '连接成功');

            if (saveOnSuccess) {
                // Step 2: 成功 → 保存到数据库
                const models = (data.models || p.models || []).join(',');
                return fetch('/api/ai/providers/configured', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        provider: p.name,
                        alias: alias,
                        api_key: apiKey,
                        api_base: apiBase,
                        api_format: apiFormat,
                        models: JSON.stringify(data.models || p.models || []),
                    }),
                });
            } else {
                // 仅测试，不保存
                div.innerHTML = '✅ ' + escapeHtml(data.message || '连接成功') +
                    '<br><span style="font-size:12px;">这是仅测试结果，未保存。点击「测试并保存」以保存到数据库</span>';
                return null;
            }
        } else {
            div.style.background = '#f8d7da';
            div.style.color = '#721c24';
            div.innerHTML = '❌ ' + escapeHtml(data.error || '连接失败');
            return null;
        }
    })
    .then(saveResult => {
        if (saveResult) {
            return saveResult.json();
        }
        return null;
    })
    .then(data => {
        if (data && data.success) {
            div.innerHTML = '✅ ✅ 已保存到数据库！';
            closeAddModal();
            loadConfigured(); // 刷新列表
        } else if (data && !data.success) {
            div.style.background = '#f8d7da';
            div.style.color = '#721c24';
            div.innerHTML = '❌ 保存失败: ' + escapeHtml(data.error || '');
        }
    })
    .catch(e => {
        div.style.background = '#f8d7da';
        div.style.color = '#721c24';
        div.innerHTML = '❌ 请求失败: ' + escapeHtml(e.message);
    });
}

// ====== 启用/禁用 ======
function toggleProvider(id) {
    fetch('/api/ai/providers/configured/' + id + '/toggle', { method: 'POST' })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            loadConfigured();
        }
    })
    .catch(() => {});
}

// ====== 删除 ======
function deleteProvider(id) {
    if (!confirm('确认从数据库删除此 AI 供应商配置？')) return;
    fetch('/api/ai/providers/configured/' + id, { method: 'DELETE' })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            loadConfigured();
        } else {
            alert('删除失败: ' + (data.error || ''));
        }
    })
    .catch(() => {});
}

// ====== 余额刷新 ======
function refreshBalance(id) {
    const el = document.getElementById('balance_' + id);
    if (el) el.innerHTML = '⏳ 刷新中...';
    fetch('/api/ai/providers/balance/refresh/' + id, { method: 'POST' })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            if (el) el.innerHTML = '💰 ' + escapeHtml(data.balance || 'N/A');
        } else {
            if (el) el.innerHTML = '❌ 查询失败';
        }
    })
    .catch(() => {
        if (el) el.innerHTML = '❌ 查询失败';
    });
}

function refreshAllBalances() {
    const btn = document.querySelector('button[onclick="refreshAllBalances()"]');
    if (btn) { btn.disabled = true; btn.innerHTML = '⏳ 刷新中...'; }
    fetch('/api/ai/providers/balance/refresh_all', { method: 'POST' })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            loadConfigured();
        }
    })
    .finally(() => {
        if (btn) { btn.disabled = false; btn.innerHTML = '🔄 刷新余额'; }
    });
}

// ====== 自定义供应商 ======
function showAddCustomProvider() {
    document.getElementById('customProvModal').style.display = 'flex';
}
function closeCustomModal() {
    document.getElementById('customProvModal').style.display = 'none';
}
function saveCustomProvider() {
    const name = document.getElementById('custName').value.trim();
    if (!name) { alert('请填写名称'); return; }
    const data = {
        name: name,
        api_base: document.getElementById('custBase').value.trim(),
        api_format: document.getElementById('custFormat').value,
        models: document.getElementById('custModels').value.split(',').map(s => s.trim()).filter(Boolean),
    };
    fetch('/api/ai/providers/custom', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
    }).then(r => r.json()).then(d => {
        if (d.success) { closeCustomModal(); loadRegistry(); }
        else { alert('保存失败: ' + (d.error || '')); }
    });
}

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text || '';
    return d.innerHTML;
}
</script>
{% endblock %}
