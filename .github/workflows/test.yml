name: CI — FlashSloth Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests pytest-playwright
          python -m playwright install chromium

      - name: Create test config
        run: |
          # Create an empty test database
          cp flashsloth.db.template flashsloth.yml 2>/dev/null || true
          echo "flashsloth.db" >> .gitignore

      - name: Start FlashSloth service
        run: |
          # Start in background
          nohup python3 admin.py > /tmp/flashsloth.log 2>&1 &
          echo "PID=$!"
          # Wait for startup
          for i in $(seq 1 10); do
            sleep 2
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/ 2>/dev/null || echo "000")
            if [ "$CODE" != "000" ]; then
              echo "Service started (HTTP $CODE)"
              break
            fi
          done

      - name: Run API tests
        run: |
          python -m pytest tests/test_api_*.py -v --tb=short

      - name: Run UI browser tests
        run: |
          python -m pytest tests/test_ui_basic.py -v --tb=short

      - name: Stop service
        if: always()
        run: |
          pkill -f 'python3 admin.py' 2>/dev/null || true

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flashsloth-logs
          path: /tmp/flashsloth.log
          retention-days: 3
