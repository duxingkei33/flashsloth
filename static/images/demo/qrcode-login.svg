<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="480" height="280" fill="#f8f9ff" rx="8"/>
  
  <!-- 标题 -->
  <text x="240" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#4361ee">📱 扫码登录流程</text>
  
  <!-- 步骤1：生成二维码 -->
  <rect x="15" y="50" width="140" height="190" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="15" y="50" width="140" height="34" rx="10" fill="#4cc9f0"/>
  <rect x="15" y="74" width="140" height="10" fill="#4cc9f0"/>
  <text x="85" y="72" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">① 生成二维码</text>
  
  <!-- 二维码图案（简化） -->
  <rect x="30" y="95" width="110" height="110" rx="5" fill="#fff"/>
  <rect x="35" y="100" width="100" height="100" rx="3" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <!-- 二维码三个角 -->
  <rect x="42" y="107" width="28" height="28" rx="3" fill="#4361ee"/>
  <rect x="46" y="111" width="20" height="20" rx="2" fill="#fff"/>
  <rect x="50" y="115" width="12" height="12" rx="1" fill="#4361ee"/>
  
  <rect x="100" y="107" width="28" height="28" rx="3" fill="#4361ee"/>
  <rect x="104" y="111" width="20" height="20" rx="2" fill="#fff"/>
  <rect x="108" y="115" width="12" height="12" rx="1" fill="#4361ee"/>
  
  <rect x="42" y="165" width="28" height="28" rx="3" fill="#4361ee"/>
  <rect x="46" y="169" width="20" height="20" rx="2" fill="#fff"/>
  <rect x="50" y="173" width="12" height="12" rx="1" fill="#4361ee"/>
  
  <!-- 二维码内部点阵 -->
  <rect x="62" y="130" width="6" height="6" fill="#333"/>
  <rect x="72" y="140" width="6" height="6" fill="#333"/>
  <rect x="82" y="130" width="6" height="6" fill="#333"/>
  <rect x="92" y="140" width="6" height="6" fill="#333"/>
  <rect x="62" y="150" width="6" height="6" fill="#333"/>
  <rect x="82" y="150" width="6" height="6" fill="#333"/>
  <rect x="92" y="130" width="6" height="6" fill="#333"/>
  <rect x="72" y="160" width="6" height="6" fill="#333"/>
  <rect x="82" y="160" width="6" height="6" fill="#333"/>
  <rect x="92" y="160" width="6" height="6" fill="#333"/>

  <text x="85" y="225" text-anchor="middle" font-size="10" fill="#999">截图显示二维码</text>
  <text x="85" y="238" text-anchor="middle" font-size="10" fill="#999">供手机扫码</text>
  
  <!-- 箭头1 -->
  <text x="168" y="145" font-size="22" fill="#4361ee" text-anchor="middle">→</text>
  
  <!-- 步骤2：手机扫码 -->
  <rect x="185" y="50" width="130" height="190" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="185" y="50" width="130" height="34" rx="10" fill="#7209b7"/>
  <rect x="185" y="74" width="130" height="10" fill="#7209b7"/>
  <text x="250" y="72" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">② 手机扫码</text>
  
  <!-- 手机示意图 -->
  <rect x="215" y="92" width="70" height="125" rx="12" fill="#333"/>
  <rect x="218" y="95" width="64" height="119" rx="10" fill="#fff"/>
  <!-- 手机屏幕 -->
  <rect x="221" y="100" width="58" height="108" rx="2" fill="#f0f4ff"/>
  <text x="250" y="118" text-anchor="middle" font-size="8" fill="#4361ee">📱</text>
  <!-- 扫描中的二维码 -->
  <rect x="230" y="128" width="40" height="40" rx="2" fill="#fff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="250" y="155" text-anchor="middle" font-size="7" fill="#4361ee">📷</text>
  <text x="250" y="175" text-anchor="middle" font-size="8" fill="#666">正在扫码</text>
  <text x="250" y="188" text-anchor="middle" font-size="8" fill="#666">登录...</text>
  
  <!-- 底部home -->
  <rect x="244" y="210" width="12" height="3" rx="1.5" fill="#ccc"/>

  <!-- 箭头2 -->
  <text x="328" y="145" font-size="22" fill="#4361ee" text-anchor="middle">→</text>
  
  <!-- 步骤3：自动登录 -->
  <rect x="345" y="50" width="120" height="190" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="345" y="50" width="120" height="34" rx="10" fill="#22c55e"/>
  <rect x="345" y="74" width="120" height="10" fill="#22c55e"/>
  <text x="405" y="72" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">③ 自动登录</text>
  
  <!-- 成功图标 -->
  <circle cx="405" cy="120" r="22" fill="#d4edda"/>
  <text x="405" y="127" text-anchor="middle" font-size="24" fill="#22c55e">✓</text>
  
  <text x="405" y="162" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="600">Cookie 自动</text>
  <text x="405" y="178" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="600">捕获并保存</text>
  
  <rect x="365" y="192" width="80" height="22" rx="4" fill="#d4edda" stroke="#c3e6cb" stroke-width="1"/>
  <text x="405" y="207" text-anchor="middle" font-size="10" fill="#155724">✅ 登录成功</text>
  
  <text x="405" y="235" text-anchor="middle" font-size="9" fill="#999">无需手动粘贴</text>

  <!-- 底部提示 -->
  <rect x="15" y="252" width="450" height="20" rx="5" fill="#eef1ff"/>
  <text x="240" y="266" text-anchor="middle" font-size="10" fill="#4361ee">💡 适合扫码平台：微信公众号、淘宝/闲鱼、B站等</text>
</svg>
