<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <rect width="480" height="280" fill="#f8f9ff" rx="8"/>
  
  <!-- 标题 -->
  <text x="240" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#4361ee">🔑 密码登录流程</text>
  
  <!-- 步骤1：填写凭据 -->
  <rect x="20" y="50" width="130" height="180" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="20" y="50" width="130" height="34" rx="10" fill="#4361ee"/>
  <rect x="20" y="74" width="130" height="10" fill="#4361ee"/>
  <text x="85" y="72" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">① 填写凭据</text>
  
  <text x="35" y="105" font-size="11" fill="#666">用户名</text>
  <rect x="30" y="110" width="110" height="22" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="125" font-size="10" fill="#999">admin...</text>
  
  <text x="35" y="152" font-size="11" fill="#666">密码</text>
  <rect x="30" y="157" width="110" height="22" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="172" font-size="10" fill="#999">••••••••</text>

  <text x="35" y="199" font-size="11" fill="#666">站点</text>
  <rect x="30" y="204" width="110" height="22" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <text x="35" y="219" font-size="10" fill="#999">example.com</text>
  
  <!-- 箭头1 -->
  <text x="165" y="140" font-size="22" fill="#4361ee" text-anchor="middle">→</text>
  
  <!-- 步骤2：浏览器自动打开 -->
  <rect x="185" y="50" width="130" height="180" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="185" y="50" width="130" height="34" rx="10" fill="#7209b7"/>
  <rect x="185" y="74" width="130" height="10" fill="#7209b7"/>
  <text x="250" y="72" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">② 自动浏览器</text>
  
  <!-- 浏览器窗口图示 -->
  <rect x="195" y="95" width="110" height="80" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <!-- 浏览器顶栏 -->
  <rect x="195" y="95" width="110" height="14" rx="5" fill="#e8e8e8"/>
  <rect x="195" y="105" width="110" height="4" fill="#e8e8e8"/>
  <circle cx="203" cy="102" r="3" fill="#ff5f56"/>
  <circle cx="212" cy="102" r="3" fill="#ffbd2e"/>
  <circle cx="221" cy="102" r="3" fill="#27c93f"/>
  <!-- 页面内容 -->
  <rect x="200" y="115" width="100" height="4" rx="2" fill="#ddd"/>
  <rect x="200" y="124" width="70" height="4" rx="2" fill="#e8e8e8"/>
  <rect x="200" y="133" width="85" height="4" rx="2" fill="#e8e8e8"/>
  <rect x="200" y="142" width="50" height="4" rx="2" fill="#e8e8e8"/>
  <!-- 验证码标记 -->
  <rect x="200" y="154" width="60" height="16" rx="3" fill="#fff3cd" stroke="#ffe58f" stroke-width="1"/>
  <text x="230" y="165" text-anchor="middle" font-size="8" fill="#996600">🔒 验证码</text>
  
  <text x="250" y="195" text-anchor="middle" font-size="9" fill="#999">后台自动打开</text>
  <text x="250" y="208" text-anchor="middle" font-size="9" fill="#999">填写并提交</text>
  
  <!-- 箭头2 -->
  <text x="330" y="140" font-size="22" fill="#4361ee" text-anchor="middle">→</text>
  
  <!-- 步骤3：凭证自动保存 -->
  <rect x="350" y="50" width="110" height="180" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1.5"/>
  <rect x="350" y="50" width="110" height="34" rx="10" fill="#22c55e"/>
  <rect x="350" y="74" width="110" height="10" fill="#22c55e"/>
  <text x="405" y="72" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">③ 自动保存</text>
  
  <!-- 保存图标 -->
  <text x="405" y="120" text-anchor="middle" font-size="30">💾</text>
  
  <text x="405" y="155" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="600">Cookie</text>
  <text x="405" y="170" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="600">自动捕获</text>
  
  <rect x="365" y="185" width="80" height="22" rx="4" fill="#d4edda" stroke="#c3e6cb" stroke-width="1"/>
  <text x="405" y="200" text-anchor="middle" font-size="10" fill="#155724">✅ 登录成功</text>
  
  <!-- 底部提示 -->
  <rect x="20" y="245" width="440" height="24" rx="5" fill="#eef1ff"/>
  <text x="240" y="261" text-anchor="middle" font-size="11" fill="#4361ee">💡 适合大多数平台：amobbs、mydigit、CSDN、OSHW 等</text>
</svg>
